<!DOCTYPE html>
<html>
<head>
<title>GitHub Issues Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

<img src="assets/github-logo.png" alt="" class="logo">

<h2>GitHub Issues Tracker</h2>
<p class="subtitle">Sign in to manage your issues</p>


<label class="input-label">Username</label>
<input type="text" id="username" placeholder="Enter your username">
<p class="default-text">Default: admin</p>


<label class="input-label">Password</label>
<input type="password" id="password" placeholder="Enter your password">
<p class="default-text">Default Password: admin123</p>


<button onclick="login()" class="login-btn">Sign In</button>


<div class="divider">
<span>OR</span>
</div>


<p class="demo-title">Demo Credential</p>


<div class="demo-card">
<p><b>Username:</b> admin</p>
<p><b>Password:</b> admin123</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
