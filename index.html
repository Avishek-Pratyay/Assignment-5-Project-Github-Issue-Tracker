<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker - Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">

<!-- Logo -->

<img src="assets/github-logo.png" alt= ""class="w-16 mx-auto mb-4">

<h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
<p class="text-gray-500 mb-6">Sign in to manage your issues</p>

<!-- Username -->

<input
id="username"
type="text"
placeholder="Enter Username"
class="border w-full p-2 mb-3 rounded"
/>

<p class="text-xs text-purple-600 mb-2 text-left">
Default: admin
</p>

<!-- Password -->

<input
id="password"
type="password"
placeholder="Enter Password"
class="border w-full p-2 mb-3 rounded"
/>

<p class="text-xs text-purple-600 mb-4 text-left">
Default: admin123
</p>

<!-- Sign In Button -->

<button
onclick="login()"
class="bg-purple-600 hover:bg-purple-700 text-white w-full py-2 rounded"

>

Sign In </button>

<!-- Demo credentials -->

<div class="mt-6 text-sm text-gray-500 border-t pt-4">

<p class="font-semibold">Demo Credentials</p>

<p>Username: admin</p>
<p>Password: admin123</p>

</div>

</div>

<script src="js/login.js"></script>

</body>

</html>
