<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<div class="flex justify-between items-center bg-white p-4 shadow">

<div class="flex items-center gap-2">

<img src="assets/github-logo.png"  alt="" class="w-6">

<h1 class="font-bold text-lg">
GitHub Issues Tracker
</h1>

</div>

<div class="flex gap-2">

<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="border p-2 rounded"
/>

<button
onclick="searchIssues()"
class="bg-purple-600 text-white px-4 rounded"

>

Search </button>

</div>

</div>

<!-- MAIN SECTION -->

<div class="p-6">

<!-- Tabs -->

<div class="flex gap-3 mb-6">

<button
id="tabAll"
onclick="changeTab('all')"
class="tab active"

>

All </button>

<button
id="tabOpen"
onclick="changeTab('open')"
class="tab"

>

Open </button>

<button
id="tabClosed"
onclick="changeTab('closed')"
class="tab"

>

Closed </button>

</div>

<!-- Issue Count + Status -->

<div class="flex justify-between items-center mb-6">

<div class="flex items-center gap-2">

<img src="assets/Aperture.png" alt="" class="w-6">

<div>

<p id="issueCount" class="font-semibold">
0 Issues
</p>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>

</div>

</div>

<div class="flex gap-4 text-sm">

<span class="flex items-center gap-2">

<span class="w-3 h-3 bg-green-500 rounded-full"></span>

Open

</span>

<span class="flex items-center gap-2">

<span class="w-3 h-3 bg-purple-500 rounded-full"></span>

Closed

</span>

</div>


</div>

<!-- Loading Spinner -->

<div
id="loading"
class="hidden text-center text-lg mb-6"
>
Loading Issues...
</div>

<!-- Issue Cards Grid -->

<div
id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"
>

</div>

</div>

<!-- MODAL -->

<!-- ISSUE DETAILS MODAL -->

<div id="issueModal"
class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-lg w-[460px] shadow-lg">

<!-- HEADER LINE -->

<div class="flex items-center gap-2 text-sm mb-4">

<span id="modalStatusBadge"
class="px-2 py-1 text-xs rounded-full border"></span>

<span>•</span>

<span id="modalOpenedBy"></span>

<span>•</span>

<span id="modalDate"></span>

</div>

<!-- LABELS -->

<div class="flex gap-2 mb-4">

<span class="px-2 py-1 bg-red-100 text-red-600 border border-red-300 rounded-full text-xs">
bug
</span>

<span class="px-2 py-1 bg-yellow-100 text-yellow-700 border border-yellow-300 rounded-full text-xs">
help wanted
</span>

</div>

<!-- DESCRIPTION -->

<p id="modalDesc"
class="text-sm text-gray-600 mb-6"></p>

<!-- ASSIGNEE + PRIORITY -->

<div class="flex justify-between items-start text-sm">

<div>

<p class="text-gray-500">Assignee:</p>

<p id="modalAssignee" class="font-medium"></p>

</div>

<div>

<p class="text-gray-500">Priority:</p>

<span id="modalPriority"
class="px-2 py-1 rounded-full text-xs border"></span>

</div>

</div>

<!-- CLOSE BUTTON -->

<button onclick="closeModal()"
class="bg-purple-600 text-white px-4 py-2 rounded w-full mt-6">
Close </button>

</div>

</div>


<script src="js/dashboard.js"></script>

<script src="js/modal.js"></script>

</body>

</html>
