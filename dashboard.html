<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<div class="flex flex-wrap justify-between items-center bg-white p-4 shadow gap-3">

<div class="flex items-center gap-2">

<img src="assets/github-logo.png" alt="" class="w-6">

<h1 class="font-bold text-lg">
GitHub Issues Tracker
</h1>

</div>

<div class="flex flex-wrap gap-2 w-full sm:w-auto">

<div class="relative w-full sm:w-72">

<svg xmlns="http://www.w3.org/2000/svg"
class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor">

<path stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z"/>

</svg>

<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="border rounded pl-9 pr-3 py-2 w-full"
/>

</div>

<button
onclick="searchIssues()"
class="bg-purple-600 text-white px-4 py-2 rounded w-full sm:w-auto">

+ New Issues

</button>

</div>

</div>

<!-- MAIN SECTION -->

<div class="p-6">

<!-- Tabs -->

<div class="flex flex-wrap gap-3 mb-6">

<button
id="tabAll"
onclick="changeTab('all')"
class="tab active">

All

</button>

<button
id="tabOpen"
onclick="changeTab('open')"
class="tab">

Open

</button>

<button
id="tabClosed"
onclick="changeTab('closed')"
class="tab">

Closed

</button>

</div>

<!-- Issue Count + Status -->

<div class="flex flex-wrap justify-between items-center mb-6 gap-4">

<div class="flex items-center gap-2">

<img src="assets/Aperture.png" alt="" class="w-6">

<div>

<p id="issueCount" class="font-semibold">
0 Issues
</p>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>

</div>

</div>

<div class="flex gap-4 text-sm">

<span class="flex items-center gap-2">

<span class="w-3 h-3 bg-green-500 rounded-full"></span>

Open

</span>

<span class="flex items-center gap-2">

<span class="w-3 h-3 bg-purple-500 rounded-full"></span>

Closed

</span>

</div>

</div>

<!-- Loading Spinner -->

<div
id="loading"
class="hidden text-center text-lg mb-6">

Loading Issues...

</div>

<!-- Issue Cards Grid -->

<div
id="issuesContainer"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

</div>

</div>

<!-- ISSUE DETAILS MODAL -->

<div id="issueModal"
class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center p-4">

<div class="bg-white p-6 rounded-lg w-full max-w-md shadow-lg flex flex-col min-h-[300px]">

<!-- HEADER -->

<div class="flex flex-wrap items-center gap-2 text-sm mb-4">

<span id="modalStatusBadge"
class="px-2 py-1 text-xs rounded-full border"></span>

<span>•</span>

<span id="modalOpenedBy"></span>

<span>•</span>

<span id="modalDate"></span>

</div>

<!-- LABELS -->

<div id="modalLabels" class="flex flex-wrap gap-2 mb-4"></div>

<!-- DESCRIPTION -->

<p id="modalDesc"
class="text-sm text-gray-600 mb-6"></p>

<!-- ASSIGNEE + PRIORITY -->

<div class="flex justify-between items-start text-sm">

<div>

<p class="text-gray-500">Assignee:</p>

<p id="modalAssignee" class="font-medium"></p>

</div>

<div>

<p class="text-gray-500">Priority:</p>

<span id="modalPriority"
class="px-2 py-1 rounded-full text-xs border"></span>

</div>

</div>

<!-- CLOSE BUTTON -->

<div class="mt-auto flex justify-end pt-6">

<button
onclick="closeModal()"
class="bg-purple-600 text-white px-4 py-2 rounded">

Close

</button>

</div>

</div>

</div>

<script src="js/dashboard.js"></script>

<script src="js/modal.js"></script>

</body>

</html>
